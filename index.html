// ── PROCEDURAL TEXTURE GENERATORS ──
function createSignTexture(text, bgColor, textColor, isHP = false) {
  const canvas = document.createElement('canvas');
  canvas.width = 512; canvas.height = 256;
  const ctx = canvas.getContext('2d');
  ctx.fillStyle = bgColor; ctx.fillRect(0, 0, 512, 256);
  if(isHP) {
    ctx.beginPath(); ctx.arc(256, 128, 90, 0, Math.PI*2);
    ctx.fillStyle = '#0070D1'; ctx.fill();
    ctx.fillStyle = '#ffffff'; ctx.font = 'italic bold 110px serif';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText('hp', 256, 138);
  } else {
    ctx.fillStyle = textColor; ctx.font = 'bold 50px sans-serif';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.letterSpacing = "5px"; ctx.fillText(text, 256, 128);
  }
  const tex = new THREE.CanvasTexture(canvas);
  tex.anisotropy = renderer.capabilities.getMaxAnisotropy();
  return tex;
}

function createTileTexture() {
  const canvas = document.createElement('canvas');
  canvas.width = 512; canvas.height = 512;
  const ctx = canvas.getContext('2d');
  ctx.fillStyle = '#fdfdfd'; ctx.fillRect(0, 0, 512, 512); 
  ctx.strokeStyle = '#e2e2e2'; ctx.lineWidth = 3; 
  ctx.beginPath(); ctx.moveTo(256, 0); ctx.lineTo(256, 512); ctx.moveTo(0, 256); ctx.lineTo(512, 256); ctx.stroke();
  const tex = new THREE.CanvasTexture(canvas);
  tex.wrapS = THREE.RepeatWrapping; tex.wrapT = THREE.RepeatWrapping; tex.repeat.set(10, 10); 
  tex.anisotropy = renderer.capabilities.getMaxAnisotropy();
  return tex;
}

function createArtTexture() {
  const canvas = document.createElement('canvas');
  canvas.width = 800; canvas.height = 500;
  const ctx = canvas.getContext('2d');
  ctx.fillStyle = '#e5e5e5'; ctx.fillRect(0,0,800,500); 
  ctx.fillStyle = '#111111'; ctx.beginPath(); ctx.arc(350, 250, 150, 0, Math.PI*2); ctx.fill(); 
  ctx.fillStyle = '#c8a050'; ctx.beginPath(); ctx.arc(450, 300, 100, 0, Math.PI*2); ctx.fill(); 
  ctx.fillStyle = '#8b4522'; ctx.fillRect(150, 100, 50, 300); 
  const tex = new THREE.CanvasTexture(canvas);
  tex.anisotropy = renderer.capabilities.getMaxAnisotropy();
  return tex;
}
