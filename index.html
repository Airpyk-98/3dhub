<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Premium Gallery Laptop Boutique</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:#111;overflow:hidden;font-family:'Segoe UI',sans-serif;width:100vw;height:100vh;}
  #cc{width:100%;height:100%;position:relative;}
  canvas{display:block;width:100%!important;height:100%!important;}
  #ui{position:fixed;bottom:30px;left:50%;transform:translateX(-50%);display:flex;gap:15px;z-index:100;}
  .btn{
    background:rgba(10,10,10,0.75);border:1px solid rgba(200,160,80,0.4);
    color:#c8a050;padding:12px 28px;border-radius:50px;cursor:pointer;
    font-size:11px;letter-spacing:0.18em;backdrop-filter:blur(16px);
    transition:all 0.3s ease;text-transform:uppercase;font-weight:700;
    box-shadow:0 4px 20px rgba(0,0,0,0.5);
  }
  .btn:hover,.btn.active{background:rgba(200,160,80,0.9);border-color:#c8a050;color:#fff;box-shadow:0 4px 28px rgba(200,160,80,0.5);}
  #overlay{
    position:fixed;inset:0;
    background:linear-gradient(135deg,#0a0a0a 0%,#111108 60%,#0a0a0a 100%);
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    z-index:999;transition:opacity 0.7s ease;
  }
  #overlay.hide{opacity:0;pointer-events:none;}
  .ring{width:52px;height:52px;border:2px solid rgba(200,160,80,0.15);border-top-color:#c8a050;border-radius:50%;animation:spin 1s linear infinite;margin-bottom:24px;}
  @keyframes spin{to{transform:rotate(360deg);}}
  #overlay h1{color:#c8a050;font-size:11px;letter-spacing:0.4em;font-weight:500;text-transform:uppercase;}
  #overlay p{color:rgba(200,160,80,0.35);font-size:9px;letter-spacing:0.25em;margin-top:8px;text-transform:uppercase;}
  #hint{position:fixed;top:22px;left:50%;transform:translateX(-50%);color:rgba(255,255,255,0.5);font-size:9px;letter-spacing:0.22em;z-index:100;pointer-events:none;background:rgba(0,0,0,0.4);padding:8px 22px;border-radius:30px;backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,0.07);text-transform:uppercase;font-weight:600;}
</style>
</head>
<body>
<div id="overlay">
  <div class="ring"></div>
  <h1>Loading Environment</h1>
  <p>Premium Gallery Boutique</p>
</div>
<div id="hint">🖱 Drag to Look &nbsp;·&nbsp; Scroll to Zoom</div>
<div id="cc"></div>
<div id="ui">
  <button class="btn active" id="btnLounge" onclick="switchRoom('lounge')">Gallery Lounge</button>
  <button class="btn" id="btnStore" onclick="switchRoom('store')">Staff Store Room</button>
</div>
